[platformio]
src_dir = main

; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32@6.11.0
board = esp32-s3-devkitm-1
framework = espidf

board_build.partitions = partitions.csv
board_build.filesystem = spiffs

# This script overrides `pio run -t uploadfs` so that spiffsgen.py is called
# with parameters read directly from your sdkconfig (SPIFFS_OBJ_NAME_LEN=64 etc.)
# instead of PlatformIO's hardcoded defaults (obj-name-len=32 → fread() returns 0).
extra_scripts = post:scripts/spiffs_upload.py   # was pre:

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; Flash firmware:          pio run -t upload
; Flash SPIFFS (frontend): pio run -t uploadfs   ← uses scripts/spiffs_upload.py
; Both in one go:          pio run -t upload && pio run -t uploadfs
