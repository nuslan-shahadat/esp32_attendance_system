<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Attendance</title>


  <style>
    /* ── Standalone login styles (doesn't need shared.css / navbar) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font:      'Courier New', monospace;
      --bg:       #0f1117;
      --card:     #1a1d27;
      --border:   #2e3347;
      --text:     #e0e6f0;
      --muted:    #7a8299;
      --dim:      #3a3f52;
      --accent:   #00c896;
      --accent-h: #00e6ad;
      --danger:   #e05c5c;
      --input-bg: #0f1117;
    }

    /* Scanline grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.03) 2px,
        rgba(0,0,0,.03) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Ambient glow behind card */
    .glow {
      position: fixed;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(0,200,150,.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;  transform: translate(-50%, -50%) scale(1.08); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.25rem 2.5rem;
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 0 1px rgba(0,200,150,.06), 0 8px 40px rgba(0,0,0,.5);

      /* Slide-in on load */
      animation: slideIn .35s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Accent top border */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    /* Header */
    .card-header {
      display: flex;
      align-items: center;
      gap: .55rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .card-header .icon {
      width: 28px; height: 28px;
      background: rgba(0,200,150,.12);
      border: 1px solid rgba(0,200,150,.25);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      color: var(--accent);
      flex-shrink: 0;
    }
    .card-header h1 {
      font-size: .88rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    .card-header .subtitle {
      font-size: .62rem;
      color: var(--muted);
      letter-spacing: .1em;
      margin-top: .15rem;
    }

    /* Fields */
    .field {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }
    label {
      color: var(--muted);
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    /* Password wrapper with toggle */
    .pwd-wrap { position: relative; }
    input[type=password],
    input[type=text] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .65rem 2.5rem .65rem .85rem;
      color: var(--text);
      font-family: var(--font);
      font-size: .88rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      letter-spacing: .06em;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,150,.1);
    }
    input.error { border-color: var(--danger); }
    input::placeholder { color: var(--dim); letter-spacing: .04em; }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: .75rem; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: .88rem;
      padding: 0;
      line-height: 1;
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--accent); }

    /* Submit button */
    .btn {
      width: 100%;
      background: var(--accent);
      color: #0a0e14;
      border: none;
      border-radius: 4px;
      padding: .75rem;
      font-family: var(--font);
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s, opacity .2s;
      margin-top: .25rem;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.08) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .btn:hover::after { transform: translateX(100%); }
    .btn:hover:not(:disabled)  { background: var(--accent-h); }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled              { opacity: .55; cursor: not-allowed; }

    /* Spinner inside button */
    .btn .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #0a0e14;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .spinner  { display: inline-block; }
    .btn.loading .btn-text { opacity: .7; }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(224,92,92,.1);
      border: 1px solid rgba(224,92,92,.3);
      border-radius: 4px;
      padding: .6rem .85rem;
      font-size: .72rem;
      color: var(--danger);
      letter-spacing: .04em;
      margin-top: .75rem;
      line-height: 1.5;
    }
    .error-msg.show { display: block; }
    .error-msg::before { content: '✗ '; font-weight: bold; }

    /* System tag */
    .sys-tag {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .6rem;
      color: var(--dim);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .sys-tag span { color: var(--accent); }

    @media (max-width: 400px) {
      .card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <div class="card-header">
    <div class="icon">■</div>
    <div>
      <h1>System Login</h1>
      <div class="subtitle">Attendance Management System</div>
    </div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="pwd-wrap">
      <input
        type="password"
        id="password"
        placeholder="Enter admin password"
        autocomplete="current-password"
        autofocus
      >
      <button class="eye-btn" type="button" id="eye-btn" title="Show/hide">&#128065;</button>
    </div>
  </div>

  <button class="btn" id="login-btn" type="button">
    <span class="spinner"></span>
    <span class="btn-text">Login</span>
  </button>

  <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>

  <div class="sys-tag">v5 &nbsp;·&nbsp; ESP32-S3 &nbsp;·&nbsp; <span>ready</span></div>
</div>

<script>
  // ── Eye toggle ────────────────────────────────────────────────
  document.getElementById('eye-btn').addEventListener('click', function () {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.textContent = inp.type === 'password' ? '👁' : '◉';
  });

  // ── Login ─────────────────────────────────────────────────────
  function doLogin() {
    const pw  = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');

    if (!pw) {
      document.getElementById('password').classList.add('error');
      err.textContent = 'Please enter your password.';
      err.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    err.classList.remove('show');
    document.getElementById('password').classList.remove('error');

    // POST to /api/login as JSON
    fetch('/api/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pw }),
    })
    .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
    .then(function (res) {
      if (res.status === 200 && res.body.ok) {
        // Redirect to role selector
        window.location.href = '/select-class.html';
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
        document.getElementById('password').classList.add('error');
        err.textContent = (res.body.error === 'wrong_password'
          ? 'Incorrect password. Try again.'
          : 'Login failed. Please retry.');
        err.classList.add('show');
        document.getElementById('password').focus();
        document.getElementById('password').select();
      }
    })
    .catch(function () {
      btn.classList.remove('loading');
      btn.disabled = false;
      err.textContent = 'Network error — is the ESP32 reachable?';
      err.classList.add('show');
    });
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>
