<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Students — Attendance</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .page-wrap { width: 100%; max-width: 960px; }
    .att-pct { font-size: .8rem; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/select-class.html" class="nb-brand"></a>
  <div class="nb-right">
    <div class="nb-cls-sel"><select id="nb-cls-select"></select></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
    <button class="mb" id="mb"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="overlay" id="overlay"></div>
<nav class="drawer" id="drawer"></nav>

<div class="confirm-bg" id="confirm-modal">
  <div class="confirm-box">
    <p id="confirm-text"><strong id="confirm-label"></strong></p>
    <div class="confirm-actions">
      <button class="confirm-yes" id="confirm-yes-btn">Confirm</button>
      <button class="confirm-no" onclick="closeModal('confirm-modal')">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h3>Edit Student</h3>
    <div class="field"><label>Name <span class="req">*</span></label><input type="text" id="em-name"></div>
    <div class="field"><label>Roll No <span class="req">*</span></label><input type="text" id="em-roll"></div>
    <div class="field"><label>Card UID <span class="req">*</span></label><input type="text" id="em-uid"></div>
    <div class="field"><label>Batch Time <span class="req">*</span></label><div class="sel-wrap"><select id="em-batch"></select></div></div>
    <input type="hidden" id="em-uid-orig">
    <div class="modal-actions">
      <button class="modal-save" onclick="submitEdit()">Save Changes</button>
      <button class="modal-cancel" onclick="closeModal('edit-modal')">Cancel</button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="card">
    <h2>Students</h2>
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search name or roll…" oninput="filterRows()">
      </div>
      <div class="filter-bar" style="margin:0;flex-shrink:0">
        <button class="ftab active-all" data-f="all" onclick="setFilter('all',this)">All</button>
        <button class="ftab" data-f="active" onclick="setFilter('active',this)">Active</button>
      </div>
      <a href="/register.html" class="btn btn-sm" style="white-space:nowrap;flex-shrink:0">+ Register</a>
    </div>

    <div id="loading" class="empty"><span class="spinner"></span></div>

    <div class="tbl-wrap">
      <table id="tbl" style="display:none">
        <thead><tr id="thead-row"><th class="num-col">#</th><th>Name</th><th>Roll</th><th>Batch</th><th>Att%</th><th class="actions-col"></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="empty-msg" style="display:none">No students found.</div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  let g_students = [];
  let g_class    = 0;
  let g_batches  = [];
  let g_schema   = [];

  document.addEventListener('DOMContentLoaded', function () {
    buildNavbar('students');
    getSession().then(s => {
      if (!s.class) { location.href = '/select-class.html'; return; }
      g_class = s.class;
      loadBatches();
      loadSchema().then(() => loadStudents());
    }).catch(() => location.href = '/login.html');
  });

  function loadBatches() {
    api('/api/batches?c=' + g_class).then(arr => {
      g_batches = arr || [];
      const sel = document.getElementById('em-batch');
      sel.innerHTML = '';
      g_batches.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        sel.appendChild(opt);
      });
    });
  }

  function loadSchema() {
    return api('/api/schema').then(s => {
      g_schema = (s.student || []).filter(c => 
        !c.system && !c['default'] && 
        !['name','roll','card_uid','batchtime'].includes(c.key) && c.ask
      );
      const tr = document.getElementById('thead-row');
      if (tr) {
        tr.querySelectorAll('.schema-th').forEach(th => th.remove());
        const actTh = tr.querySelector('.actions-col');
        g_schema.forEach(col => {
          const th = document.createElement('th');
          th.className = 'schema-th';
          th.textContent = col.label;
          tr.insertBefore(th, actTh);
        });
      }
    });
  }

  function loadStudents() {
    g_students = [];
    const loading = document.getElementById('loading');
    const tbl = document.getElementById('tbl');
    const emptyMsg = document.getElementById('empty-msg');
    const tbody = document.getElementById('tbody');

    if (tbl) tbl.style.display = 'none';
    if (emptyMsg) emptyMsg.style.display = 'none';
    if (loading) loading.style.display = 'block';

    apiStream(
      '/api/students?c=' + g_class,

      s => {
        if (g_students.length === 0) {
          if (loading) loading.style.display = 'none';
          if (tbl) tbl.style.display = 'table';
          if (emptyMsg) emptyMsg.style.display = 'none';
        }
        g_students.push(s);
        if (tbody) tbody.appendChild(buildStudentRow(s, g_students.length));
      },

      () => {
        if (g_students.length === 0) {
          if (tbl) tbl.style.display = 'none';
          if (emptyMsg) emptyMsg.style.display = 'block';
        } else {
          renderTable();
        }
      },

      e => { if (loading) loading.textContent = 'Error: ' + e.message; }
    );
  }

  function buildStudentRow(s, rowNum) {
    const pct = s.att_pct != null ? Math.round(s.att_pct) : null;
    const pctColor = pct !== null ? (pct >= 75 ? 'sv-green' : pct >= 50 ? 'sv-warn' : 'sv-red') : 'sv-grey';

    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="num-col">${rowNum}</td>` +
      `<td data-label="Name"><a class="name-link" href="/student-detail.html?uid=${encodeURIComponent(s.uid)}">${esc(s.name)}</a></td>` +
      `<td data-label="Roll">${esc(s.roll || '—')}</td>` +
      `<td data-label="Batch">${esc(s.batchtime || '—')}</td>` +
      `<td data-label="Att%" class="att-pct ${pctColor}">${pct !== null ? pct + '%' : '—'}</td>` +
      g_schema.map(col => {
        const v = (s.extra && s.extra[col.key]) || s[col.key] || '—';
        return `<td data-label="${esc(col.label)}">${esc(String(v))}</td>`;
      }).join('') +
      `<td class="actions-col">${actionsHtml(s)}</td>`;

    return tr;
  }

  function setFilter(f) {
    document.querySelectorAll('.ftab').forEach(b => {
      b.className = 'ftab' + (b.dataset.f === f ? ' active-all' : '');
    });
    renderTable();
  }

  function filterRows() { renderTable(); }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const f = document.querySelector('.ftab.active-all')?.dataset.f || 'all';

    const rows = g_students.filter(s => {
      if (f === 'active' && s.archived) return false;
      if (q && !(s.name.toLowerCase().includes(q) || String(s.roll).toLowerCase().includes(q))) return false;
      return true;
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (!rows.length) {
      document.getElementById('tbl').style.display = 'none';
      document.getElementById('empty-msg').style.display = 'block';
      return;
    }

    document.getElementById('tbl').style.display = 'table';
    document.getElementById('empty-msg').style.display = 'none';

    rows.forEach((s, i) => tbody.appendChild(buildStudentRow(s, i+1)));
  }

  let g_actionMap = {};
  let g_actionIdx = 0;

  function actionsHtml(s) {
    const key = 'k' + (g_actionIdx++);
    g_actionMap[key] = s;
    return `<button class="act-btn" onclick="openEdit(g_actionMap['${key}'])">Edit</button> ` +
           `<button class="act-btn act-btn-del" onclick="doDelete(g_actionMap['${key}'].uid, g_actionMap['${key}'].name)">Delete</button>`;
  }

  function doDelete(uid, name) {
    confirmAction(`Permanently delete ${name}? This cannot be undone.`, () => {
      let removed = null, idx = -1;
      for (let i = 0; i < g_students.length; i++) {
        if (g_students[i].uid === uid) { removed = g_students[i]; idx = i; break; }
      }
      if (idx >= 0) g_students.splice(idx, 1);
      renderTable();
      showToast('Deleted');

      api(`/api/students/delete?uid=${encodeURIComponent(uid)}&c=${g_class}`, 'DELETE')
        .catch(e => {
          if (removed && idx >= 0) g_students.splice(idx, 0, removed);
          renderTable();
          showToast(e.message, true);
        });
    });
  }

  function openEdit(s) {
    document.getElementById('em-uid-orig').value = s.uid;
    document.getElementById('em-name').value = s.name;
    document.getElementById('em-roll').value = s.roll;
    document.getElementById('em-uid').value = s.uid;
    const sel = document.getElementById('em-batch');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === s.batchtime) { sel.selectedIndex = i; break; }
    }
    openModal('edit-modal');
  }

  function submitEdit() {
    const body = {
      uid_orig: document.getElementById('em-uid-orig').value,
      name: document.getElementById('em-name').value.trim(),
      roll: document.getElementById('em-roll').value.trim(),
      card_uid: document.getElementById('em-uid').value.trim(),
      batchtime: document.getElementById('em-batch').value
    };
    if (!body.name || !body.roll || !body.card_uid) {
      showToast('Fill all fields', true);
      return;
    }

    let backup = null, idx = -1;
    for (let i = 0; i < g_students.length; i++) {
      if ((g_students[i].uid || g_students[i].card_uid) === body.uid_orig) {
        backup = Object.assign({}, g_students[i]);
        idx = i;
        g_students[i] = Object.assign({}, g_students[i], {
          name: body.name, roll: body.roll,
          uid: body.card_uid, card_uid: body.card_uid,
          batchtime: body.batchtime
        });
        break;
      }
    }

    closeModal('edit-modal');
    renderTable();
    showToast('Updated');

    api('/api/students/edit', 'POST', body).catch(e => {
      if (idx >= 0 && backup) g_students[idx] = backup;
      renderTable();
      showToast(e.message, true);
    });
  }

  function esc(v) {
    return String(v == null ? '' : v)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
