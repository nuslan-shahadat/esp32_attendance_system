<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report — Attendance</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .page-wrap { width: 100%; max-width: 980px; }
    .controls { display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .controls .field { margin: 0; }
    .pct-cell  { min-width: 130px; }
    .pct-num   { font-size: .82rem; font-weight: bold; margin-bottom: .22rem; }
    tfoot td   { font-weight: bold; color: var(--accent); font-size: .76rem; letter-spacing: .07em; padding: .7rem .9rem; border-top: 2px solid var(--accent); }
    .export-btn { margin-left: auto; }
    #summary-bar { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    #summary-bar .sb { display: flex; flex-direction: column; gap: .2rem; }
    #summary-bar .sv { font-size: 1.3rem; font-weight: bold; }
    #summary-bar .sl { font-size: .59rem; color: var(--muted); letter-spacing: .13em; text-transform: uppercase; }
    .loading-status { font-size: .75rem; color: var(--muted); margin-top: .5rem; }
    @media (max-width: 500px) {
      .controls { flex-direction: column; align-items: stretch; }
      .export-btn { margin-left: 0; }
    }
    @media print {
      .controls { display: none !important; }
      #summary-bar { border-bottom: 1px solid #ccc; }
      .pct-bar-wrap { display: none; }
      tfoot td { border-top: 2px solid #000; color: #000; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/select-class.html" class="nb-brand"></a>
  <div class="nb-right">
    <div class="nb-cls-sel"><select id="nb-cls-select"></select></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">&#9728; Light</button>
    <button class="mb" id="mb" aria-label="Open navigation menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="overlay" id="overlay"></div>
<nav class="drawer" id="drawer"></nav>

<div class="page-wrap">
  <div class="card">
    <h2>Monthly Report</h2>

    <div class="controls">
      <div class="field">
        <label>Month</label>
        <input type="month" id="month-pick">
      </div>
      <button class="btn btn-sm" style="align-self:flex-end;margin-top:0" onclick="loadReport()">Generate</button>
      <a id="csv-btn" class="btn btn-sm btn-outline export-btn" style="align-self:flex-end;margin-top:0;display:none" href="#" download>↓ Export CSV</a>
    </div>

    <div id="summary-wrap" style="display:none">
      <div id="summary-bar">
        <div class="sb"><span class="sv sv-grey"  id="rp-days">—</span><span class="sl">Class Days</span></div>
        <div class="sb"><span class="sv sv-grey"  id="rp-students">—</span><span class="sl">Students</span></div>
        <div class="sb"><span class="sv sv-green" id="rp-ok">—</span><span class="sl">Above Threshold</span></div>
        <div class="sb"><span class="sv sv-warn"  id="rp-below">—</span><span class="sl">Below Threshold</span></div>
      </div>
    </div>

    <div id="loading" class="empty">
      <span class="spinner"></span>
      <div class="loading-status" id="loading-status">Preparing report...</div>
    </div>

    <div class="tbl-wrap">
      <table id="rep-table" style="display:none">
        <thead>
          <tr>
            <th class="num-col">#</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Present</th>
            <th>Att%</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rep-body"></tbody>
        <tfoot><tr id="rep-foot"></tr></tfoot>
      </table>
    </div>
    <div class="empty" id="rep-empty" style="display:none">No data for selected month.</div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  let g_class      = 0;
  let g_reportGen  = 0;
  let g_rows       = [];
  let g_classDays  = 0;
  let g_minPct     = 75;

  function esc(v) {
    return String(v == null ? '' : v)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function appendRow(r, idx) {
    const pct     = Math.round(r.pct || 0);
    const cls     = pct >= g_minPct ? 'sv-green' : pct >= 50 ? 'sv-warn' : 'sv-red';
    const barCls  = pct >= g_minPct ? 'pct-bar-green' : pct >= 50 ? 'pct-bar-warn' : 'pct-bar-red';
    const status  = pct >= g_minPct ? '<span class="badge badge-green">OK</span>' : '<span class="badge badge-warn">Low</span>';

    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="num-col">${idx}</td>` +
      `<td data-label="Name">${esc(r.name)}</td>` +
      `<td data-label="Roll">${esc(r.roll)}</td>` +
      `<td data-label="Present">${r.present || 0} / ${g_classDays}</td>` +
      `<td data-label="Att%" class="pct-cell">` +
        `<div class="pct-num ${cls}">${pct}%</div>` +
        `<div class="pct-bar-wrap"><div class="pct-bar ${barCls}" style="width:${pct}%"></div></div>` +
      `</td>` +
      `<td data-label="Status">${status}</td>`;

    document.getElementById('rep-body').appendChild(tr);
  }

  function updateSummary() {
    const total = g_rows.length;
    const below = g_rows.filter(r => (r.pct || 0) < g_minPct).length;
    document.getElementById('rp-days').textContent     = g_classDays;
    document.getElementById('rp-students').textContent = total;
    document.getElementById('rp-ok').textContent       = total - below;
    document.getElementById('rp-below').textContent    = below;
  }

  function renderFooter() {
    const total  = g_rows.length;
    const avgPct = total ? Math.round(g_rows.reduce((s, r) => s + (r.pct || 0), 0) / total) : 0;
    const okCnt  = g_rows.filter(r => (r.pct || 0) >= g_minPct).length;
    document.getElementById('rep-foot').innerHTML =
      `<td colspan="3">Class Average</td><td></td>` +
      `<td>${avgPct}%</td>` +
      `<td>${okCnt}/${total} OK</td>`;
  }

  function loadReport() {
    const gen = ++g_reportGen;
    const month = document.getElementById('month-pick').value;
    if (!month) { showToast('Please select a month', true); return; }

    // Reset UI
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading-status').textContent = 'Preparing report...';
    document.getElementById('rep-table').style.display = 'none';
    document.getElementById('rep-empty').style.display = 'none';
    document.getElementById('summary-wrap').style.display = 'none';
    document.getElementById('csv-btn').style.display = 'none';
    document.getElementById('rep-body').innerHTML = '';
    document.getElementById('rep-foot').innerHTML = '';

    g_rows = [];
    g_classDays = 0;
    g_minPct = 75;

    apiStreamReport(
      `/api/report?c=${g_class}&month=${month}`,

      hdr => {
        if (gen !== g_reportGen) return;
        g_classDays = hdr.class_days || 0;
        g_minPct    = hdr.min_pct || 75;
        updateSummary();
      },

      r => {
        if (gen !== g_reportGen) return;
        g_rows.push(r);

        // Show table on first row
        if (g_rows.length === 1) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('rep-table').style.display = 'table';
          document.getElementById('summary-wrap').style.display = 'block';
        }

        appendRow(r, g_rows.length);
        updateSummary();

        // Optional: show progress
        document.getElementById('loading-status').textContent = `Loaded ${g_rows.length} students...`;
      },

      () => {
        if (gen !== g_reportGen) return;
        document.getElementById('loading').style.display = 'none';

        if (g_rows.length === 0) {
          document.getElementById('rep-empty').style.display = 'block';
          return;
        }

        renderFooter();

        const csvBtn = document.getElementById('csv-btn');
        csvBtn.href = `/api/admin/export-csv?c=${g_class}&type=attendance&month=${month}`;
        csvBtn.style.display = 'inline-flex';
      },

      e => {
        if (gen !== g_reportGen) return;
        document.getElementById('loading').style.display = 'none';
        showToast(e.message || 'Failed to load report', true);
      }
    );
  }

  document.addEventListener('DOMContentLoaded', () => {
    buildNavbar('report');

    const now = new Date();
    document.getElementById('month-pick').value =
      now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

    getSession().then(s => {
      if (!s.class) { location.href = '/select-class.html'; return; }
      g_class = s.class;
      loadReport();
    }).catch(() => location.href = '/login.html');
  });
</script>
</body>
</html>
