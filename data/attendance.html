<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .page-wrap { width: 100%; max-width: 1080px; }
    .subtitle { font-size:.66rem; color:var(--dim); font-weight:normal; letter-spacing:.06em; text-transform:none; }

    .scan-status-bar {
      display:none; align-items:center; gap:.55rem; flex-wrap:wrap;
      padding:.65rem .8rem; margin-bottom:1.1rem;
      border:1px solid var(--border); border-radius:4px; background:var(--stat-bg); font-size:.72rem;
    }
    .scan-dot { width:9px; height:9px; border-radius:50%; background:var(--dim); transition:transform .15s,box-shadow .2s,background .2s; }
    .scan-dot.connected { background:var(--accent); }
    .scan-dot.scanning  { background:var(--accent); box-shadow:0 0 0 6px rgba(0,200,150,.12); transform:scale(1.05); }
    .scan-label { color:var(--muted); letter-spacing:.08em; text-transform:uppercase; font-size:.62rem; }
    .scan-event { color:var(--text); }
    .scan-event.err { color:var(--danger); }

    .tab-shell { margin-bottom:1rem; }
    .tab-bar {
      position:relative; display:inline-flex;
      background:var(--stat-bg); border:1px solid var(--border); border-radius:5px;
      padding:3px; margin-bottom:1rem; overflow:hidden; width:100%; max-width:360px;
    }
    .tab-bar .tab-pill {
      position:absolute; top:3px; bottom:3px; left:3px;
      background:var(--accent); border-radius:3px;
      transition:left .22s cubic-bezier(.4,0,.2,1),width .22s cubic-bezier(.4,0,.2,1); z-index:0;
    }
    .tab-bar button {
      position:relative; z-index:1; flex:1; background:none; border:none; border-radius:3px;
      padding:.38rem .9rem; font-family:'Courier New',Courier,monospace; font-size:.72rem;
      letter-spacing:.1em; text-transform:uppercase; cursor:pointer; color:var(--muted);
      transition:color .18s; white-space:nowrap;
    }
    .tab-bar button.active { color:#0f1117; font-weight:bold; }

    .filter-bar { display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap; }
    .ftab {
      background:none; border:1px solid var(--border); border-radius:3px; padding:.28rem .72rem;
      font-family:'Courier New',Courier,monospace; font-size:.68rem; letter-spacing:.09em;
      text-transform:uppercase; cursor:pointer; color:var(--muted); text-decoration:none;
      transition:all .14s; white-space:nowrap;
    }
    .ftab:hover { border-color:var(--accent); color:var(--accent); }
    .ftab.active-all,.ftab.active-present,.ftab.active-absent { color:var(--text); border-color:var(--muted); }

    .toolbar { display:flex; gap:.65rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
    .toolbar .search-wrap { position:relative; flex:1; min-width:160px; margin-bottom:0; }
    .toolbar .search-wrap::before {
      content:'🔍'; position:absolute; left:.7rem; top:50%; transform:translateY(-50%);
      font-size:.8rem; opacity:.4; pointer-events:none;
    }
    .toolbar input[type="text"] { padding-left:1.9rem; width:100%; }

    .today-table-wrap,.log-table-wrap {
      overflow:hidden; border:1px solid var(--border); border-radius:4px; margin-bottom:.9rem;
    }
    tbody tr.clickable { cursor:pointer; }
    tbody tr.clickable:hover { background:var(--row-hover); }
    .num-col { width:1%; white-space:nowrap; }

    .status-present {
      display:inline-flex; align-items:center; gap:.25rem;
      color:var(--accent); font-size:.72rem; font-weight:bold; letter-spacing:.08em; text-transform:uppercase;
    }
    .status-absent {
      display:inline-flex; align-items:center; gap:.25rem;
      color:var(--danger); font-size:.72rem; font-weight:bold; letter-spacing:.08em; text-transform:uppercase;
    }

    .date-group { margin-bottom:1.15rem; }
    .date-group-hdr {
      display:flex; align-items:center; gap:.75rem; padding:.5rem .75rem;
      background:var(--stat-bg); border:1px solid var(--border); border-radius:4px 4px 0 0;
      cursor:pointer; user-select:none;
    }
    .date-group-hdr .dg-date { font-size:.78rem; color:var(--accent); letter-spacing:.1em; font-weight:bold; }
    .date-group-hdr .dg-cnt  {
      font-size:.68rem; color:var(--muted); margin-left:auto;
      background:var(--badge-bg); border:1px solid var(--border); border-radius:3px; padding:.1rem .4rem;
    }
    .date-group-hdr .dg-arr  { color:var(--muted); font-size:.7rem; transition:transform .2s; flex-shrink:0; }
    .date-group.collapsed .dg-arr         { transform:rotate(-90deg); }
    .date-group-body { border:1px solid var(--border); border-top:none; border-radius:0 0 4px 4px; overflow:hidden; }
    .date-group.collapsed .date-group-body { display:none; }
    .date-group.collapsed .date-group-hdr  { border-radius:4px; }

    .empty-note {
      color:var(--muted); font-size:.76rem; text-align:center;
      padding:1rem .75rem; border:1px dashed var(--border); border-radius:4px; background:var(--stat-bg);
    }
    .student-banner {
      display:flex; align-items:center; gap:1rem; padding:.85rem 1.1rem;
      background:linear-gradient(135deg,rgba(0,200,150,.07),transparent);
      border:1px solid rgba(0,200,150,.2); border-radius:6px; margin-bottom:1rem;
    }
    .sb-avatar {
      width:44px; height:44px; border-radius:8px; background:rgba(0,200,150,.12);
      border:1px solid rgba(0,200,150,.25); display:flex; align-items:center; justify-content:center;
      font-size:1.15rem; font-weight:bold; color:var(--accent); flex-shrink:0;
    }
    .sb-name { font-size:.95rem; font-weight:bold; }
    .sb-sub  { font-size:.66rem; color:var(--muted); margin-top:.18rem; letter-spacing:.06em; }
    .sb-back { margin-left:auto; font-size:.68rem; }

    @media (max-width:580px) {
      .tab-bar { max-width:100%; }
      .toolbar { flex-direction:column; align-items:stretch; }
      .toolbar .search-wrap { width:100%; }
      .page-wrap { max-width:100%; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/select-class.html" class="nb-brand"></a>
  <div class="nb-right">
    <div class="nb-cls-sel">
      <select id="nb-cls-select"></select>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">&#9728; Light</button>
    <button class="mb" id="mb"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="overlay" id="overlay"></div>
<nav class="drawer" id="drawer"></nav>

<div class="confirm-bg" id="confirm-modal">
  <div class="confirm-box">
    <p>Delete record for <strong id="confirm-label"></strong>?</p>
    <div class="confirm-actions">
      <button class="confirm-yes" id="confirm-yes-btn">Delete</button>
      <button class="confirm-no" onclick="closeModal('confirm-modal')">Cancel</button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="card">
    <h2>
      <span id="page-title">Attendance</span>
      <span class="subtitle" id="page-subtitle"></span>
      <button class="btn-sm btn btn-outline" style="margin-left:auto;margin-top:0" onclick="loadData()">↺ Refresh</button>
    </h2>

    <div class="student-banner" id="student-banner" style="display:none">
      <div class="sb-avatar" id="sb-avatar">?</div>
      <div>
        <div class="sb-name" id="sb-name">—</div>
        <div class="sb-sub"  id="sb-sub">—</div>
      </div>
      <a class="back-btn sb-back" href="/students.html">← Students</a>
    </div>

    <div class="scan-status-bar" id="scan-bar">
      <span class="scan-dot"   id="scan-dot"></span>
      <span class="scan-label" id="scan-label">RFID Scanner</span>
      <span class="scan-event" id="scan-event"></span>
    </div>

    <div class="stat-bar" id="stat-bar">
      <div class="sb"><span class="sv sv-grey"  id="st-total">—</span><span class="sl">Registered</span></div>
      <div class="sb"><span class="sv sv-green" id="st-present">—</span><span class="sl">Present</span></div>
      <div class="sb"><span class="sv sv-red"   id="st-absent">—</span><span class="sl">Absent</span></div>
      <div class="sb"><span class="sv sv-grey"  id="st-pct">—</span><span class="sl">Att%</span></div>
    </div>

    <div class="tab-shell">
      <div class="tab-bar">
        <div class="tab-pill"></div>
        <button data-tab="today-section" class="active">Today</button>
        <button data-tab="log-section">Full Log</button>
      </div>
    </div>

    <!-- TODAY TAB -->
    <div id="today-section">
      <div class="filter-bar" id="today-filter-bar">
        <button type="button" class="ftab active-all" data-filter="all">All</button>
        <button type="button" class="ftab" data-filter="present">● Present</button>
        <button type="button" class="ftab" data-filter="absent">● Absent</button>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="today-search" placeholder="Search name, roll, UID…" oninput="filterToday()">
        </div>
      </div>
      <div class="today-table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Status</th><th>Time</th></tr>
          </thead>
          <tbody id="today-tbody">
            <tr><td colspan="7" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- LOG TAB -->
    <div id="log-section" style="display:none">
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="log-search" placeholder="Search name or UID…" oninput="filterLog()">
        </div>
      </div>
      <div id="log-groups">
        <div class="empty-note">Loading…</div>
      </div>
    </div>

    <!-- Mark Attendance section REMOVED per requirements -->

  </div>
</div>

<script src="/app.js"></script>
<script>
  var g_class       = 0;
  var g_uid         = null;
  var g_sseHandle   = null;
  var g_todayRows   = [];
  var g_todayFilter = 'all';
  var g_att_schema  = []; /* declared here; populated after schema fetch */

  /* ─── Helpers ─────────────────────────────────────────── */
  function pad2(n){ return String(n).padStart(2,'0'); }
  function localDateStr(d){
    return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
  }
  function getTodayName(){ return localDateStr(new Date()); }
  function esc(v){
    return String(v==null?'':v)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* Normalize a "today" entry — backend gives {uid,name,roll,batch,present:bool,time} */
  function normalizeTodayItem(item){
    if(!item) return {name:'',roll:'',uid:'',batch:'',time:'',status:'absent'};
    return {
      name:   item.name  || item.nm        || '',
      roll:   item.roll  || item.rl        || '',
      uid:    item.uid   || item.card_uid  || '',
      batch:  item.batch || item.batchtime || item.bt || '',
      time:   item.time  || item.entry_time|| '',
      /* ← THE FIX: use the boolean present field, not sub-arrays */
      status: item.present ? 'present' : 'absent'
    };
  }

  /* Normalize an individual log record */
  function normalizeLogRecord(item, date){
    if(!item) return {name:'',roll:'',uid:'',batch:'',time:'',status:'',id:'',date:date||''};
    return {
      name:   item.name   || item.nm   || '',
      roll:   item.roll   || item.rl   || '',
      uid:    item.uid    || item.card_uid || '',
      batch:  item.batch  || item.batchtime || item.bt || '',
      time:   item.time   || item.entry_time || '',
      status: item.status || 'present',
      id:     item.id     || '',
      date:   item.date   || date || ''
    };
  }

  /* ─── Filter buttons ─────────────────────────────────── */
  function setActiveFilter(filter){
    g_todayFilter = filter||'all';
    document.querySelectorAll('#today-filter-bar .ftab').forEach(function(btn){
      btn.classList.remove('active-all','active-present','active-absent');
      if(btn.dataset.filter===g_todayFilter)
        btn.classList.add(g_todayFilter==='all'?'active-all':'active-'+g_todayFilter);
    });
    filterToday();
  }

  /* ─── Stats ──────────────────────────────────────────── */
  function renderStats(total, present, absent){
    document.getElementById('st-total').textContent   = total;
    document.getElementById('st-present').textContent = present;
    document.getElementById('st-absent').textContent  = absent;
    document.getElementById('st-pct').textContent     =
      total>0 ? Math.round((present*100)/total)+'%' : '—';
  }

  /* ─── Init ───────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function(){
    buildNavbar('attendance');
    api('/api/schema').then(function(s){ g_att_schema = (s.attendance || []).filter(function(c){ return !c.system && c.ask; }); });
    var params   = new URLSearchParams(location.search);
    g_uid        = params.get('uid') || null;
    var startTab = params.get('tab') || (g_uid ? 'log-section' : 'today-section');
    var today    = localDateStr(new Date());

    document.getElementById('page-subtitle').textContent = 'Loading…';

    document.querySelectorAll('#today-filter-bar .ftab').forEach(function(btn){
      btn.addEventListener('click', function(){ setActiveFilter(btn.dataset.filter); });
    });

    getSession().then(function(s){
      if(!s.class){ location.href='/select-class.html'; return; }
      g_class = s.class;
      document.getElementById('page-subtitle').textContent = 'Class '+g_class+' · '+today;

      if(g_uid){
        document.getElementById('scan-bar').style.display = 'none';
        loadStudentInfo(g_uid);
      } else {
        document.getElementById('scan-bar').style.display = 'flex';
        startRFIDPoll();
      }

      loadData();
      initTabs(['today-section','log-section'], startTab);
      setActiveFilter('all');
    }).catch(function(){ location.href='/login.html'; });
  });

  /* ─── Student info banner ────────────────────────────── */
  function loadStudentInfo(uid){
    api('/api/students?c='+g_class).then(function(arr){
      var s=(arr||[]).find(function(x){ return x.uid===uid||x.card_uid===uid; });
      if(!s) return;
      var name=s.name||'Student';
      var initials=name.trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      document.getElementById('sb-avatar').textContent = initials||'?';
      document.getElementById('sb-name').textContent   = name;
      document.getElementById('sb-sub').textContent    =
        'Roll: '+(s.roll||'—')+'  ·  Batch: '+(s.batchtime||s.batch||'—')+'  ·  UID: '+(s.uid||s.card_uid||'—');
      document.getElementById('student-banner').style.display = 'flex';
      document.getElementById('page-title').textContent = 'Attendance History';
    });
  }

  /* ─── RFID fast polling (1.5 s — replaces broken SSE) ── */
  function startRFIDPoll(){
    var dot   = document.getElementById('scan-dot');
    var label = document.getElementById('scan-label');
    var evEl  = document.getElementById('scan-event');
    if(!dot||!label||!evEl) return;

    dot.className     = 'scan-dot connected';
    label.textContent = 'RFID Live';
    var lastSeq = 0;

    function poll(){
      fetch('/api/rfid-events',{credentials:'same-origin'})
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(d){
          if(!d) return;
          dot.className     = 'scan-dot connected';
          label.textContent = 'RFID Live';

          if(d.seq && d.seq!==lastSeq){
            lastSeq = d.seq;
            dot.className = 'scan-dot scanning';
            setTimeout(function(){ dot.className='scan-dot connected'; }, 500);

            if(d.status==='registered'){
              evEl.className   = 'scan-event';
              evEl.textContent = '✓ '+(d.name||d.uid)+' — '+(d.time||'');
              loadData();          /* immediate refresh on new scan */
            } else if(d.status==='already'){
              evEl.className   = 'scan-event';
              evEl.textContent = '↩ Already: '+(d.name||d.uid);
            } else if(d.status==='unknown'){
              evEl.className   = 'scan-event err';
              evEl.textContent = '? Unknown: '+d.uid;
            }

            clearTimeout(evEl._t);
            evEl._t = setTimeout(function(){ evEl.textContent=''; evEl.className='scan-event'; }, 5000);
          }
        })
        .catch(function(){
          dot.className     = 'scan-dot';
          label.textContent = 'Reconnecting…';
        });
    }

    poll();
    var timer = setInterval(poll, 1500);   /* 1.5 s — fast enough for real-time feel */
    g_sseHandle = { stop: function(){ clearInterval(timer); } };
  }

  /* ─── Load data ──────────────────────────────────────── */
  function loadData() {
    var todayBox = document.getElementById('today-tbody');
    var logBox   = document.getElementById('log-groups');
    if (todayBox) todayBox.innerHTML = '<tr><td colspan="7" class="empty">Loading…</td></tr>';
    if (logBox)   logBox.innerHTML   = "<div class='empty-note'>Loading…</div>";

    g_todayRows = [];
    var firstTodayItem = true;
    var firstLogGroup  = true;

    var url = '/api/attendance?c=' + g_class;
    if (g_uid) url += '&uid=' + encodeURIComponent(g_uid);

    apiStreamAttendance(
      url,

      /* onHeader — stats arrive first, before any row data */
      function (header) {
        var st = header.stats || {};
        renderStats(st.total || 0, st.present || 0, st.absent || 0);
      },

      /* onTodayItem — each student in today's tab arrives one at a time */
      function (item) {
        if (firstTodayItem) {
          /* Clear the "Loading…" placeholder on first real row */
          if (todayBox) todayBox.innerHTML = '';
          firstTodayItem = false;
        }

        var row = normalizeTodayItem(item);
        g_todayRows.push(row);

        /* Append immediately so the user sees rows as they stream in */
        if (!todayBox) return;
        var i          = g_todayRows.length;
        var statusHtml = row.status === 'present'
          ? "<span class='status-present'>● Present</span>"
          : "<span class='status-absent'>● Absent</span>";
        var nameLink = row.uid
          ? "<a href='/attendance.html?uid=" + encodeURIComponent(row.uid) +
            "&tab=log-section' style='color:var(--text);text-decoration:none'>" +
            esc(row.name || '—') + '</a>'
          : esc(row.name || '—');

        var tr = document.createElement('tr');
        tr.className = 'clickable';
        tr.innerHTML =
          "<td class='num-col'>" + i + '</td>' +
          '<td>' + nameLink + '</td>' +
          "<td><span class='badge badge-grey'>" + esc(row.roll || '—') + '</span></td>' +
          "<td><span class='badge badge-green' style='font-size:.64rem'>" + esc(row.uid || '—') + '</span></td>' +
          "<td><span style='color:var(--muted);font-size:.82rem'>" + esc(row.batch || '—') + '</span></td>' +
          '<td>' + statusHtml + '</td>' +
          '<td>' + (row.time
            ? "<span style='color:var(--text);font-size:.83rem'>" + esc(row.time) + '</span>'
            : "<span style='color:var(--dim);font-size:.78rem'>—</span>") + '</td>';
        todayBox.appendChild(tr);
      },

      /* onLogItem — each date-group in the full log arrives one at a time */
      function (group) {
        if (firstLogGroup) {
          if (logBox) logBox.innerHTML = '';
          firstLogGroup = false;
        }
        appendLogGroup(group);
      },

      /* onDone — stream finished */
      function () {
        if (firstTodayItem && todayBox) {
          todayBox.innerHTML = "<tr><td colspan='7' class='empty'>No students found.</td></tr>";
        } else {
          filterToday();
        }
        if (firstLogGroup && logBox) {
          logBox.innerHTML = "<div class='empty-note'>No attendance records yet.</div>";
        }
      },

      /* onError */
      function (e) {
        if (todayBox) todayBox.innerHTML =
          '<tr><td colspan="7" class="empty">Error: ' + esc(e.message) + '</td></tr>';
        if (logBox) logBox.innerHTML =
          "<div class='empty-note'>Error: " + esc(e.message) + '</div>';
      }
    );
  }

  /* ─── Render today tab ───────────────────────────────── */
  function renderToday(todayArr){
    /* todayArr is a flat array — each item has present:bool, not sub-arrays */
    g_todayRows = todayArr.map(normalizeTodayItem);
    filterToday();
  }

  function filterToday(){
    var searchEl = document.getElementById('today-search');
    var q = searchEl ? searchEl.value.toLowerCase() : '';

    var rows = g_todayRows.filter(function(r){
      if(g_todayFilter!=='all' && r.status!==g_todayFilter) return false;
      if(!q) return true;
      return [r.name,r.roll,r.uid,r.batch,r.time,r.status].some(function(v){
        return String(v||'').toLowerCase().includes(q);
      });
    });

    /* Present first, then alphabetical */
    rows.sort(function(a,b){
      if(a.status!==b.status) return a.status==='present' ? -1 : 1;
      return String(a.name||'').localeCompare(String(b.name||''));
    });

    var tbody = document.getElementById('today-tbody');
    if(!tbody) return;
    tbody.innerHTML = '';

    if(!rows.length){
      tbody.innerHTML = "<tr><td colspan='7' class='empty'>No results</td></tr>";
      return;
    }

    rows.forEach(function(r, i){
      var statusHtml = r.status==='present'
        ? "<span class='status-present'>● Present</span>"
        : "<span class='status-absent'>● Absent</span>";

      var nameLink = r.uid
        ? "<a href='/attendance.html?uid="+encodeURIComponent(r.uid)+"&tab=log-section' style='color:var(--text);text-decoration:none'>"+esc(r.name||'—')+"</a>"
        : esc(r.name||'—');

      var tr = document.createElement('tr');
      tr.className = 'clickable';
      tr.innerHTML =
        "<td class='num-col'>"+(i+1)+"</td>"+
        "<td>"+nameLink+"</td>"+
        "<td><span class='badge badge-grey'>"+esc(r.roll||'—')+"</span></td>"+
        "<td><span class='badge badge-green' style='font-size:.64rem'>"+esc(r.uid||'—')+"</span></td>"+
        "<td><span style='color:var(--muted);font-size:.82rem'>"+esc(r.batch||'—')+"</span></td>"+
        "<td>"+statusHtml+"</td>"+
        "<td>"+(r.time
          ? "<span style='color:var(--text);font-size:.83rem'>"+esc(r.time)+"</span>"
          : "<span style='color:var(--dim);font-size:.78rem'>—</span>")+"</td>";
      tbody.appendChild(tr);
    });
  }

  /* ─── Render log tab ─────────────────────────────────────
     Backend: log = [{date, present_count, absent_count, records:[{id,uid,name,roll,batch,time,status}]}, …]
     Old bug: log was treated as a flat record array — each date-group object was
              passed to normalizeLogRecord() which found no name/uid, so nothing rendered.
     Fix: iterate log[], extract date + records[] from each group. */

  /* ── appendLogGroup — renders a single date-group and appends it ──
   * Used during streaming so each group appears as soon as it arrives. */
  function appendLogGroup(group) {
    var container = document.getElementById('log-groups');
    if (!container) return;

    var date = group.date || getTodayName();
    var records = (group.records || []).map(function (rec) {
      return normalizeLogRecord(rec, date);
    });
    records.sort(function (a, b) {
      return String(b.time || '').localeCompare(String(a.time || ''));
    });

    var today      = getTodayName();
    var showActions = !!g_uid;
    var pCnt = records.filter(function (r) { return (r.status || 'present') === 'present'; }).length;
    var aCnt = records.filter(function (r) { return r.status === 'absent'; }).length;

    var tableHead = showActions
      ? '<tr><th>#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Time</th><th>Status</th><th>Actions</th></tr>'
      : '<tr><th>#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Time</th><th>Status</th></tr>';

    var tbodyHtml = records.map(function (r, idx) {
      var statusHtml = (r.status || 'present') === 'present'
        ? "<span class='status-present'>● Present</span>"
        : "<span class='status-absent'>● Absent</span>";
      var nameCell = r.uid
        ? "<a href='/attendance.html?uid=" + encodeURIComponent(r.uid) +
          "&tab=log-section' style='color:var(--text);text-decoration:none'>" +
          esc(r.name || '—') + '</a>'
        : esc(r.name || '—');

      var row =
        "<tr data-name='" + esc(r.name || '') + "' data-uid='" + esc(r.uid || '') +
        "' data-status='" + esc(r.status || 'present') + "'>" +
        "<td class='num-col'>" + (idx + 1) + '</td>' +
        '<td>' + nameCell + '</td>' +
        "<td><span class='badge badge-grey'>" + esc(r.roll || '—') + '</span></td>' +
        "<td><span class='badge badge-green' style='font-size:.64rem'>" + esc(r.uid || '—') + '</span></td>' +
        "<td><span style='color:var(--muted);font-size:.82rem'>" + esc(r.batch || '—') + '</span></td>' +
        "<td><span style='color:var(--text);font-size:.83rem'>" + esc(r.time || '—') + '</span></td>' +
        '<td>' + statusHtml + '</td>';

      if (showActions) {
        row += "<td class='actions-col'>" +
          "<button class='act-btn act-btn-del' onclick=\"delRecord(" +
          JSON.stringify(r.id || '') + ',' + JSON.stringify(r.name || '') + ',' +
          JSON.stringify(date) + ")\">✕ Remove</button></td>";
      }
      return row + '</tr>';
    }).join('');

    var groupEl = document.createElement('div');
    groupEl.className = 'date-group collapsed';
    groupEl.innerHTML =
      "<div class='date-group-hdr'>" +
        "<span class='dg-date'>" + esc(date) +
          (date === today ? " <span class='today-tag'>Today</span>" : '') +
        '</span>' +
        (pCnt ? "<span style='font-size:.66rem;color:var(--accent);margin-left:.4rem'>&#9679; " + pCnt + 'P</span>' : '') +
        (aCnt ? "<span style='font-size:.66rem;color:var(--danger);margin-left:.3rem'>&#9679; " + aCnt + 'A</span>' : '') +
        "<span class='dg-cnt'>" + records.length + ' record' + (records.length === 1 ? '' : 's') + '</span>' +
        "<span class='dg-arr'>&#9660;</span>" +
      '</div>' +
      "<div class='date-group-body'>" +
        '<table><thead>' + tableHead + '</thead><tbody>' + tbodyHtml + '</tbody></table>' +
      '</div>';

    container.appendChild(groupEl);
  }

  function renderLog(logArr){
    var container = document.getElementById('log-groups');
    if(!container) return;

    /* Build date→records map from the date-group array */
    var grouped = {};
    logArr.forEach(function(group){
      var date = group.date || getTodayName();
      grouped[date] = (group.records||[]).map(function(rec){
        return normalizeLogRecord(rec, date);
      });
    });

    var dates = Object.keys(grouped).sort().reverse();
    if(!dates.length){
      container.innerHTML = "<div class='empty-note'>No attendance records yet.</div>";
      return;
    }

    var today       = getTodayName();
    var showActions = !!g_uid;
    container.innerHTML = '';

    dates.forEach(function(date){
      var records = grouped[date]||[];
      records.sort(function(a,b){ return String(b.time||'').localeCompare(String(a.time||'')); });

      var pCnt = records.filter(function(r){ return (r.status||'present')==='present'; }).length;
      var aCnt = records.filter(function(r){ return r.status==='absent'; }).length;

      var group = document.createElement('div');
      group.className = 'date-group collapsed';

      var tableHead = showActions
        ? "<tr><th>#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Time</th><th>Status</th><th>Actions</th></tr>"
        : "<tr><th>#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Time</th><th>Status</th></tr>";

      var tbodyHtml = records.map(function(r, idx){
        var statusHtml = (r.status||'present')==='present'
          ? "<span class='status-present'>● Present</span>"
          : "<span class='status-absent'>● Absent</span>";
        var nameCell = r.uid
          ? "<a href='/attendance.html?uid="+encodeURIComponent(r.uid)+"&tab=log-section' style='color:var(--text);text-decoration:none'>"+esc(r.name||'—')+"</a>"
          : esc(r.name||'—');

        var row =
          "<tr data-name='"+esc(r.name||'')+"' data-uid='"+esc(r.uid||'')+"' data-status='"+esc(r.status||'present')+"'>"+
          "<td class='num-col'>"+(idx+1)+"</td>"+
          "<td>"+nameCell+"</td>"+
          "<td><span class='badge badge-grey'>"+esc(r.roll||'—')+"</span></td>"+
          "<td><span class='badge badge-green' style='font-size:.64rem'>"+esc(r.uid||'—')+"</span></td>"+
          "<td><span style='color:var(--muted);font-size:.82rem'>"+esc(r.batch||'—')+"</span></td>"+
          "<td><span style='color:var(--text);font-size:.83rem'>"+esc(r.time||'—')+"</span></td>"+
          "<td>"+statusHtml+"</td>";

        if(showActions){
          row += "<td class='actions-col'>"+
            "<button class='act-btn act-btn-del' onclick=\"delRecord("+
            JSON.stringify(r.id||'')+","+JSON.stringify(r.name||'')+","+JSON.stringify(date)+
            ")\">✕ Remove</button></td>";
        }
        return row+"</tr>";
      }).join('');

      group.innerHTML =
        "<div class='date-group-hdr'>"+
          "<span class='dg-date'>"+esc(date)+(date===today?" <span class='today-tag'>Today</span>":"")+"</span>"+
          (pCnt?"<span style='font-size:.66rem;color:var(--accent);margin-left:.4rem'>&#9679; "+pCnt+"P</span>":"")+
          (aCnt?"<span style='font-size:.66rem;color:var(--danger);margin-left:.3rem'>&#9679; "+aCnt+"A</span>":"")+
          "<span class='dg-cnt'>"+records.length+" record"+(records.length===1?"":"s")+"</span>"+
          "<span class='dg-arr'>&#9660;</span>"+
        "</div>"+
        "<div class='date-group-body'>"+
          "<table><thead>"+tableHead+"</thead><tbody>"+tbodyHtml+"</tbody></table>"+
        "</div>";

      container.appendChild(group);
    });

    initGroups();
    filterLog();
  }

  function filterLog(){
    var searchEl = document.getElementById('log-search');
    var q = searchEl ? searchEl.value.toLowerCase() : '';
    document.querySelectorAll('#log-groups .date-group').forEach(function(grp){
      var rows = grp.querySelectorAll('tbody tr[data-name]');
      var vis = 0;
      rows.forEach(function(r){
        var show = !q || [r.dataset.name,r.dataset.uid].some(function(v){
          return String(v||'').toLowerCase().includes(q);
        });
        r.style.display = show ? '' : 'none';
        if(show) vis++;
      });
      grp.style.display = vis ? '' : 'none';
    });
  }

  function delRecord(id, name, date){
    confirmAction(name+' on '+date, function(){
      api('/api/attendance/delete?id='+encodeURIComponent(id)+'&c='+g_class)
        .then(function(){ showToast('Record deleted'); loadData(); })
        .catch(function(e){ showToast(e.message, true); });
    });
  }
</script>
</body>
</html>
