<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .page-wrap { width: 100%; max-width: 1080px; }
    .subtitle { font-size:.66rem; color:var(--dim); font-weight:normal; letter-spacing:.06em; text-transform:none; }

    .scan-status-bar { display:none; align-items:center; gap:.55rem; flex-wrap:wrap; padding:.65rem .8rem; margin-bottom:1.1rem; border:1px solid var(--border); border-radius:4px; background:var(--stat-bg); font-size:.72rem; }
    .scan-dot { width:9px; height:9px; border-radius:50%; background:var(--dim); transition:transform .15s,box-shadow .2s,background .2s; }
    .scan-dot.connected { background:var(--accent); }
    .scan-dot.scanning  { background:var(--accent); box-shadow:0 0 0 6px rgba(0,200,150,.12); transform:scale(1.05); }
    .scan-label { color:var(--muted); letter-spacing:.08em; text-transform:uppercase; font-size:.62rem; }
    .scan-event { color:var(--text); }
    .scan-event.err { color:var(--danger); }

    .tab-shell { margin-bottom:1rem; }
    .tab-bar { position:relative; display:inline-flex; background:var(--stat-bg); border:1px solid var(--border); border-radius:5px; padding:3px; margin-bottom:1rem; overflow:hidden; width:100%; max-width:360px; }
    .tab-bar .tab-pill { position:absolute; top:3px; bottom:3px; left:3px; background:var(--accent); border-radius:3px; transition:left .22s cubic-bezier(.4,0,.2,1),width .22s cubic-bezier(.4,0,.2,1); z-index:0; }
    .tab-bar button { position:relative; z-index:1; flex:1; background:none; border:none; border-radius:3px; padding:.38rem .9rem; font-family:'Courier New',Courier,monospace; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; color:var(--muted); transition:color .18s; white-space:nowrap; }
    .tab-bar button.active { color:#0f1117; font-weight:bold; }

    .filter-bar { display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap; }
    .ftab { background:none; border:1px solid var(--border); border-radius:3px; padding:.28rem .72rem; font-family:'Courier New',Courier,monospace; font-size:.68rem; letter-spacing:.09em; text-transform:uppercase; cursor:pointer; color:var(--muted); text-decoration:none; transition:all .14s; white-space:nowrap; }
    .ftab:hover { border-color:var(--accent); color:var(--accent); }
    .ftab.active-all,.ftab.active-present,.ftab.active-absent { color:var(--text); border-color:var(--muted); }

    .toolbar { display:flex; gap:.65rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
    .toolbar .search-wrap { position:relative; flex:1; min-width:160px; margin-bottom:0; }
    .toolbar .search-wrap::before { content:'🔍'; position:absolute; left:.7rem; top:50%; transform:translateY(-50%); font-size:.8rem; opacity:.4; pointer-events:none; }
    .toolbar input[type="text"] { padding-left:1.9rem; width:100%; }

    .today-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border); border-radius:4px; margin-bottom:.9rem; }
    tbody tr.clickable { cursor:pointer; }
    tbody tr.clickable:hover { background:var(--row-hover); }
    .num-col { width:1%; white-space:nowrap; }

    .status-present { color:var(--accent); font-size:.72rem; font-weight:bold; letter-spacing:.08em; text-transform:uppercase; }
    .status-absent  { color:var(--danger); font-size:.72rem; font-weight:bold; letter-spacing:.08em; text-transform:uppercase; }

    .date-group { margin-bottom:1.15rem; }
    .date-group-hdr { display:flex; align-items:center; gap:.75rem; padding:.5rem .75rem; background:var(--stat-bg); border:1px solid var(--border); border-radius:4px 4px 0 0; cursor:pointer; user-select:none; }
    .date-group-hdr .dg-date { font-size:.78rem; color:var(--accent); letter-spacing:.1em; font-weight:bold; }
    .date-group-hdr .dg-cnt  { font-size:.68rem; color:var(--muted); margin-left:auto; background:var(--badge-bg); border:1px solid var(--border); border-radius:3px; padding:.1rem .4rem; }
    .date-group-hdr .dg-arr  { color:var(--muted); font-size:.7rem; transition:transform .2s; flex-shrink:0; }
    .date-group.collapsed .dg-arr { transform:rotate(-90deg); }
    .date-group-body { border:1px solid var(--border); border-top:none; border-radius:0 0 4px 4px; overflow:hidden; }
    .date-group.collapsed .date-group-body { display:none; }
    .date-group.collapsed .date-group-hdr { border-radius:4px; }

    .empty-note { color:var(--muted); font-size:.76rem; text-align:center; padding:1rem .75rem; border:1px dashed var(--border); border-radius:4px; background:var(--stat-bg); }

    @media (max-width:580px) {
      .tab-bar { max-width:100%; }
      .toolbar { flex-direction:column; align-items:stretch; }
      .toolbar .search-wrap { width:100%; }
      .page-wrap { max-width:100%; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/select-class.html" class="nb-brand"></a>
  <div class="nb-right">
    <div class="nb-cls-sel"><select id="nb-cls-select"></select></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">&#9728; Light</button>
    <button class="mb" id="mb" aria-label="Open navigation menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="overlay" id="overlay"></div>
<nav class="drawer" id="drawer"></nav>

<div class="confirm-bg" id="confirm-modal">
  <div class="confirm-box">
    <p id="confirm-text"><strong id="confirm-label"></strong></p>
    <div class="confirm-actions">
      <button class="confirm-yes" id="confirm-yes-btn">Confirm</button>
      <button class="confirm-no" onclick="closeModal('confirm-modal')">Cancel</button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="card">
    <h2>
      <span id="page-title">Attendance</span>
      <span class="subtitle" id="page-subtitle"></span>
      <button class="btn-sm btn btn-outline" onclick="loadData()">↺ Refresh</button>
    </h2>

    <div class="scan-status-bar" id="scan-bar">
      <span class="scan-dot" id="scan-dot"></span>
      <span class="scan-label" id="scan-label">RFID Scanner</span>
      <span class="scan-event" id="scan-event"></span>
    </div>

    <div class="stat-bar" id="stat-bar">
      <div class="sb"><span class="sv sv-grey" id="st-total">—</span><span class="sl">Registered</span></div>
      <div class="sb"><span class="sv sv-green" id="st-present">—</span><span class="sl">Present</span></div>
      <div class="sb"><span class="sv sv-red" id="st-absent">—</span><span class="sl">Absent</span></div>
      <div class="sb"><span class="sv sv-grey" id="st-pct">—</span><span class="sl">Att%</span></div>
    </div>

    <div class="tab-shell">
      <div class="tab-bar">
        <div class="tab-pill"></div>
        <button data-tab="today-section" class="active">Today</button>
        <button data-tab="log-section">Full Log</button>
      </div>
    </div>

    <!-- TODAY TAB -->
    <div id="today-section">
      <div class="filter-bar" id="today-filter-bar">
        <button class="ftab active-all" data-filter="all">All</button>
        <button class="ftab" data-filter="present">● Present</button>
        <button class="ftab" data-filter="absent">● Absent</button>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="today-search" placeholder="Search name, roll, UID…">
        </div>
      </div>
      <div class="today-table-wrap">
        <table>
          <thead><tr><th class="num-col">#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Status</th><th>Time</th><th></th></tr></thead>
          <tbody id="today-tbody"><tr><td colspan="8" class="empty">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- FULL LOG TAB -->
    <div id="log-section" style="display:none">
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="log-search" placeholder="Search name or UID…">
        </div>
      </div>
      <div id="log-groups"><div class="empty-note">Loading…</div></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  let g_class = 0;
  let g_todayRows = [];
  let g_todayFilter = 'all';
  let g_loadGen = 0;

  function pad2(n) { return String(n).padStart(2, '0'); }
  function localDateStr(d) { return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
  function getTodayName() { return localDateStr(new Date()); }

  function esc(v) {
    return String(v == null ? '' : v)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function normalizeTodayItem(item) {
    if (!item) return {name:'', roll:'', uid:'', batch:'', time:'', status:'absent'};
    return {
      name:   item.name  || item.nm        || '',
      roll:   item.roll  || item.rl        || '',
      uid:    item.uid   || item.card_uid  || '',
      batch:  item.batch || item.batchtime || item.bt || '',
      time:   item.time  || item.entry_time|| '',
      status: item.present ? 'present' : 'absent'
    };
  }

  function renderStats(total, present, absent) {
    document.getElementById('st-total').textContent   = total;
    document.getElementById('st-present').textContent = present;
    document.getElementById('st-absent').textContent  = absent;
    document.getElementById('st-pct').textContent     = total > 0 ? Math.round((present*100)/total)+'%' : '—';
  }

  function setActiveFilter(filter) {
    g_todayFilter = filter || 'all';
    document.querySelectorAll('#today-filter-bar .ftab').forEach(btn => {
      btn.classList.remove('active-all','active-present','active-absent');
      if (btn.dataset.filter === g_todayFilter) {
        btn.classList.add(g_todayFilter === 'all' ? 'active-all' : 'active-' + g_todayFilter);
      }
    });
    filterToday();
  }

  function buildTodayRow(r, rowNum) {
    const statusHtml = r.status === 'present' ? `<span class="status-present">● Present</span>` : `<span class="status-absent">● Absent</span>`;
    const nameLink = r.uid ? `<a href="/student-detail.html?uid=${encodeURIComponent(r.uid)}" style="color:var(--text);text-decoration:none">${esc(r.name || '—')}</a>` : esc(r.name || '—');
    const actionCell = (r.uid && r.status === 'absent') ? `<td><button class="btn-sm btn btn-outline ajax-mark-btn" style="padding:.18rem .5rem;font-size:.62rem" data-uid="${esc(r.uid)}">+ Mark</button></td>` : '<td></td>';

    const tr = document.createElement('tr');
    tr.className = 'clickable';
    if (r.uid) tr.addEventListener('click', e => {
      if (!e.target.closest('a') && !e.target.closest('button')) location.href = `/student-detail.html?uid=${encodeURIComponent(r.uid)}`;
    });

    tr.innerHTML = `<td class="num-col">${rowNum}</td><td>${nameLink}</td><td><span class="badge badge-grey">${esc(r.roll || '—')}</span></td><td><span class="badge badge-green" style="font-size:.64rem">${esc(r.uid || '—')}</span></td><td><span style="color:var(--muted);font-size:.82rem">${esc(r.batch || '—')}</span></td><td>${statusHtml}</td><td>${r.time ? `<span style="color:var(--text);font-size:.83rem">${esc(r.time)}</span>` : `<span style="color:var(--dim);font-size:.78rem">—</span>`}</td>` + actionCell;

    if (r.uid && r.status === 'absent') {
      const btn = tr.querySelector('.ajax-mark-btn');
      if (btn) btn.addEventListener('click', e => { e.stopPropagation(); markPresent(btn.dataset.uid, btn); });
    }
    return tr;
  }

  function filterToday() {
    const q = (document.getElementById('today-search')?.value || '').toLowerCase().trim();
    let rows = g_todayRows.filter(r => {
      if (g_todayFilter !== 'all' && r.status !== g_todayFilter) return false;
      if (!q) return true;
      return [r.name, r.roll, r.uid, r.batch, r.time].some(v => String(v||'').toLowerCase().includes(q));
    });
    rows.sort((a,b) => a.status !== b.status ? (a.status==='present' ? -1 : 1) : String(a.name||'').localeCompare(String(b.name||'')));

    const tbody = document.getElementById('today-tbody');
    tbody.innerHTML = '';
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty">No results</td></tr>`;
      return;
    }
    rows.forEach((r, i) => tbody.appendChild(buildTodayRow(r, i+1)));
  }

function loadData() {
  const gen = ++g_loadGen;
  const tbody = document.getElementById('today-tbody');
  const logBox = document.getElementById('log-groups');

  tbody.innerHTML = '<tr><td colspan="8" class="empty">Loading…</td></tr>';
  if (logBox) logBox.innerHTML = '<div class="empty-note">Loading Full Log…</div>';

  g_todayRows = [];
  let firstLogGroup = true;

  apiStreamAttendance(
    `/api/attendance?c=${g_class}`,

    header => { if (gen === g_loadGen) renderStats(header.stats?.total||0, header.stats?.present||0, header.stats?.absent||0); },

    item => {
      if (gen !== g_loadGen) return;
      const r = normalizeTodayItem(item);
      g_todayRows.push(r);
      if (g_todayRows.length === 1 && tbody) tbody.innerHTML = '';
      if (tbody) tbody.appendChild(buildTodayRow(r, g_todayRows.length));
    },

    group => {
      if (gen !== g_loadGen) return;
      if (firstLogGroup) {
        if (logBox) logBox.innerHTML = '';
        firstLogGroup = false;
      }
      appendLogGroup(group);
    },

    () => {
      if (gen !== g_loadGen) return;
      if (g_todayRows.length === 0 && tbody) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty">No students found.</td></tr>`;
      }
      // Make sure all date groups are expandable
      initGroups();
    },

    err => {
      if (gen !== g_loadGen) return;
      const msg = esc(err.message || 'Unknown error');
      if (tbody) tbody.innerHTML = `<tr><td colspan="8" class="empty">Error: ${msg}</td></tr>`;
      if (logBox) logBox.innerHTML = `<div class="empty-note">Error: ${msg}</div>`;
    }
  );
}

  /* ==================== RFID, Mark, Delete, Log functions ==================== */
  function startRFIDPoll() {
    const dot = document.getElementById('scan-dot');
    const label = document.getElementById('scan-label');
    const evEl = document.getElementById('scan-event');
    if (!dot || !label || !evEl) return;

    let lastSeq = 0;
    dot.className = 'scan-dot connected';
    label.textContent = 'RFID Live';

    function poll() {
      fetch('/api/rfid-events', {credentials:'same-origin'})
        .then(r => r.ok ? r.json() : null)
        .then(d => {
          if (!d) return;
          dot.className = 'scan-dot connected';
          label.textContent = 'RFID Live';

          if (d.seq && d.seq !== lastSeq) {
            lastSeq = d.seq;
            dot.className = 'scan-dot scanning';
            setTimeout(() => dot.className = 'scan-dot connected', 500);

            const uid = String(d.uid || '').trim();
            if (d.status === 'registered') {
              evEl.className = 'scan-event';
              evEl.textContent = `✓ ${d.name || d.uid} — ${d.time || ''}`;
              g_todayRows.forEach(r => { if (String(r.uid || '').trim() === uid) { r.status = 'present'; r.time = d.time || ''; } });
              const p = g_todayRows.filter(r => r.status==='present').length;
              const a = g_todayRows.filter(r => r.status==='absent').length;
              renderStats(g_todayRows.length, p, a);
              filterToday();
              clearTimeout(window._rfidReloadTimer);
              window._rfidReloadTimer = setTimeout(loadData, 4000);
            } else if (d.status === 'already') {
              evEl.className = 'scan-event';
              evEl.textContent = `↩ Already: ${d.name || d.uid}`;
            } else if (d.status === 'unknown') {
              evEl.className = 'scan-event err';
              evEl.textContent = `? Unknown: ${d.uid}`;
            }
            clearTimeout(evEl._t);
            evEl._t = setTimeout(() => { evEl.textContent=''; evEl.className='scan-event'; }, 5000);
          }
        })
        .catch(() => { dot.className = 'scan-dot'; label.textContent = 'Reconnecting…'; });
    }
    poll();
    var rfidIntervalId = setInterval(poll, 1500);
    window.addEventListener('pagehide', function() {
      clearInterval(rfidIntervalId);
    });
  }

  function markPresent(uid, btn) {
    if (!uid) return;
    const today = getTodayName();
    const now = new Date();
    const hhmm = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;

    btn.disabled = true; btn.textContent = '…';

    api('/api/attendance/mark', 'POST', { uid, date: today, time: hhmm })
      .then(() => {
        g_todayRows.forEach(r => { if (r.uid === uid) { r.status = 'present'; r.time = hhmm; } });
        filterToday();
        refreshSummary();
        showToast(`✓ Marked present: ${uid}`);
      })
      .catch(e => { btn.disabled = false; btn.textContent = '+ Mark'; showToast(e.message, true); });
  }

  function deleteRecord(id, rowEl) {
    if (!id) return;
    confirmAction(`Delete attendance record #${id}?`, () => {
      api(`/api/attendance/delete?id=${encodeURIComponent(id)}`)
        .then(() => {
          rowEl.style.transition = 'opacity .25s';
          rowEl.style.opacity = '0';
          setTimeout(() => { rowEl.remove(); refreshSummary(); }, 260);
          showToast('Record deleted.');
        })
        .catch(e => showToast(e.message, true));
    });
  }

  function refreshSummary() {
    const today = getTodayName();
    api(`/api/attendance/summary?c=${g_class}&date=${today}`)
      .then(s => renderStats(s.total||0, s.present||0, s.absent||0))
      .catch(() => {});
  }

  function appendLogGroup(group) {
    const container = document.getElementById('log-groups');
    if (!container) return;

    const date = group.date || getTodayName();
    const records = (group.records || []).map(rec => normalizeLogRecord(rec, date));
    records.sort((a,b) => String(b.time||'').localeCompare(String(a.time||'')));

    const todayStr = getTodayName();
    // Use server-provided counts: absent = total_students - present (not just logged-absent rows)
    const pCnt = (group.present_count != null) ? group.present_count : records.filter(r => (r.status||'present')==='present').length;
    const aCnt = (group.absent_count  != null) ? group.absent_count  : records.filter(r => r.status==='absent').length;

    const tbodyHtml = records.map((r, idx) => {
      const statusHtml = (r.status||'present')==='present' ? `<span class="status-present">● Present</span>` : `<span class="status-absent">● Absent</span>`;
      const nameCell = r.uid ? `<a href="/student-detail.html?uid=${encodeURIComponent(r.uid)}" style="color:var(--text);text-decoration:none">${esc(r.name||'—')}</a>` : esc(r.name||'—');
      return `<tr data-name="${esc(r.name||'')}" data-uid="${esc(r.uid||'')}" data-status="${esc(r.status||'present')}" data-id="${esc(r.id||'')}">` +
        `<td class="num-col">${idx+1}</td>` +
        `<td>${nameCell}</td>` +
        `<td><span class="badge badge-grey">${esc(r.roll||'—')}</span></td>` +
        `<td><span class="badge badge-green" style="font-size:.64rem">${esc(r.uid||'—')}</span></td>` +
        `<td><span style="color:var(--muted);font-size:.82rem">${esc(r.batch||'—')}</span></td>` +
        `<td><span style="color:var(--text);font-size:.83rem">${esc(r.time||'—')}</span></td>` +
        `<td>${statusHtml}</td>` +
        `<td>${r.id ? `<button class="btn-sm btn btn-outline ajax-del-btn" style="padding:.18rem .45rem;font-size:.62rem;color:var(--danger);border-color:var(--danger)" data-id="${esc(r.id)}">✕</button>` : ''}</td></tr>`;
    }).join('');

    const groupEl = document.createElement('div');
    groupEl.className = 'date-group collapsed';
    groupEl.dataset.gi = '1'; // prevent initGroups() from adding a duplicate click handler
    groupEl.innerHTML = 
      `<div class="date-group-hdr">` +
        `<span class="dg-date">${esc(date)}${date===todayStr ? ` <span class="today-tag">Today</span>` : ''}</span>` +
        (pCnt ? `<span style="font-size:.66rem;color:var(--accent);margin-left:.4rem">&#9679; ${pCnt}P</span>` : '') +
        (aCnt ? `<span style="font-size:.66rem;color:var(--danger);margin-left:.3rem">&#9679; ${aCnt}A</span>` : '') +
        `<span class="dg-cnt">${records.length} record${records.length===1?'':'s'}</span>` +
        `<span class="dg-arr">&#9660;</span>` +
      `</div>` +
      `<div class="date-group-body"><table><thead><tr><th>#</th><th>Name</th><th>Roll</th><th>UID</th><th>Batch</th><th>Time</th><th>Status</th><th></th></tr></thead><tbody>${tbodyHtml}</tbody></table></div>`;

    // Wire collapse
    const hdr = groupEl.querySelector('.date-group-hdr');
    if (hdr) hdr.addEventListener('click', () => groupEl.classList.toggle('collapsed'));

    // Wire delete buttons
    groupEl.querySelectorAll('.ajax-del-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        deleteRecord(btn.dataset.id, btn.closest('tr'));
      });
    });

    container.appendChild(groupEl);
  }

  function normalizeLogRecord(item, date) {
    if (!item) return {name:'',roll:'',uid:'',batch:'',time:'',status:'present',id:'',date:date||''};
    return {
      name: item.name||item.nm||'', roll: item.roll||item.rl||'', uid: item.uid||item.card_uid||'',
      batch: item.batch||item.batchtime||item.bt||'', time: item.time||item.entry_time||'',
      status: item.status||'present', id: item.id||'', date: item.date||date||''
    };
  }

  function filterLog() {
    const q = (document.getElementById('log-search')?.value || '').toLowerCase().trim();
    document.querySelectorAll('#log-groups .date-group').forEach(grp => {
      let vis = 0;
      grp.querySelectorAll('tbody tr[data-name]').forEach(row => {
        const match = !q || [row.dataset.name, row.dataset.uid].some(v => String(v||'').toLowerCase().includes(q));
        row.style.display = match ? '' : 'none';
        if (match) vis++;
      });
      grp.style.display = vis ? '' : 'none';
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    buildNavbar('attendance');
    const today = getTodayName();
    document.getElementById('page-subtitle').textContent = 'Loading…';

    document.querySelectorAll('#today-filter-bar .ftab').forEach(btn => {
      btn.addEventListener('click', () => setActiveFilter(btn.dataset.filter));
    });

    document.getElementById('today-search').addEventListener('input', debounce(filterToday, 180));
    document.getElementById('log-search').addEventListener('input', debounce(filterLog, 180));

    getSession().then(s => {
      if (!s.class) { location.href = '/select-class.html'; return; }
      g_class = s.class;
      document.getElementById('page-subtitle').textContent = `Class ${g_class} · ${today}`;

      document.getElementById('scan-bar').style.display = 'flex';
      startRFIDPoll();

      loadData();
      initTabs(['today-section','log-section'], 'today-section');
      setActiveFilter('all');
    }).catch(() => location.href = '/login.html');
